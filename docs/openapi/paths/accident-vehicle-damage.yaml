caseVehicles:
  get:
    tags:
      - Accident Vehicles and Damages
    summary: List vehicles for a case
    operationId: listCaseVehicles
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    responses:
      "200":
        description: Vehicles returned successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../../IDAP.yaml#/components/schemas/VehicleOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  post:
    tags:
      - Accident Vehicles and Damages
    summary: Create a vehicle for a case
    operationId: createCaseVehicle
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/CreateVehicleRequest"
    responses:
      "201":
        description: Vehicle created successfully.
        headers:
          Location:
            schema:
              type: string
              example: /api/vehicles/1
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/VehicleOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
      "409":
        $ref: "../../IDAP.yaml#/components/responses/ConflictProblem"
vehicleById:
