analysisConclusion:
  get:
    tags:
      - Accident Conclusions and Reports
    summary: Get analysis conclusion
    operationId: getAnalysisConclusion
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    responses:
      "200":
        description: Analysis conclusion returned successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/AnalysisConclusionOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  put:
    tags:
      - Accident Conclusions and Reports
    summary: Create or update analysis conclusion
    operationId: upsertAnalysisConclusion
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/UpsertAnalysisConclusionRequest"
    responses:
      "200":
        description: Analysis conclusion saved successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/AnalysisConclusionOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  delete:
    tags:
      - Accident Conclusions and Reports
    summary: Delete analysis conclusion
    operationId: deleteAnalysisConclusion
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    responses:
      "204":
        description: Analysis conclusion deleted successfully.
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
reports:
  get:
    tags:
      - Accident Conclusions and Reports
    summary: List all reports visible to the current user
    description: Admins receive every report; other users receive only the reports for cases they own.
    operationId: listReports
    security:
      - cookieAuth: []
    responses:
      "200":
        description: Reports returned successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../../IDAP.yaml#/components/schemas/ReportOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
analysisReports:
  get:
    tags:
      - Accident Conclusions and Reports
    summary: List reports for an analysis
    operationId: listAnalysisReports
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    responses:
      "200":
        description: Reports returned successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../../IDAP.yaml#/components/schemas/ReportOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  post:
    tags:
      - Accident Conclusions and Reports
    summary: Generate a report for an analysis
    description: Creates a report for the analysis, linking the case's vehicles automatically and attaching the given image_evidence entries as supporting images.
    operationId: createAnalysisReport
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/CreateReportRequest"
    responses:
      "201":
        description: Report created successfully.
        headers:
          Location:
            schema:
              type: string
              example: /api/reports/1
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/ReportOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
      "500":
        $ref: "../../IDAP.yaml#/components/responses/ReportGenerationFailedProblem"
reportById:
  get:
    tags:
      - Accident Conclusions and Reports
    summary: Get report by id
    operationId: getReportById
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/ReportId"
    responses:
      "200":
        description: Report returned successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/ReportOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  put:
    tags:
      - Accident Conclusions and Reports
    summary: Update report
    operationId: updateReport
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/ReportId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/UpdateReportRequest"
    responses:
      "200":
        description: Report updated successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/ReportOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  delete:
    tags:
      - Accident Conclusions and Reports
    summary: Delete report
    operationId: deleteReport
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/ReportId"
    responses:
      "204":
        description: Report deleted successfully.
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
