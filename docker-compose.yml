# Local infrastructure for IDAP.
# MinIO provides S3-compatible object storage for evidence and measurement images,
# keeping the image bytes out of the PostgreSQL tables (which only store object keys).
#
# Start with:   docker compose up -d
# Console UI:   http://localhost:9001  (user/password below)
# S3 endpoint:  http://localhost:9000
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
