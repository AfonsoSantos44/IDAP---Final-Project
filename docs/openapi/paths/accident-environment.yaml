caseWeather:
  get:
    tags:
      - Accident Environment
    summary: Get weather conditions for a case
    operationId: getCaseWeather
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    responses:
      "200":
        description: Weather conditions returned successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/WeatherConditionsOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  put:
    tags:
      - Accident Environment
    summary: Refresh weather conditions from WeatherAPI
    operationId: refreshCaseWeather
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/RefreshWeatherConditionsRequest"
    responses:
      "200":
        description: Weather conditions refreshed successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/WeatherConditionsOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
      "502":
        $ref: "../../IDAP.yaml#/components/responses/ExternalDataUnavailableProblem"
  delete:
    tags:
      - Accident Environment
    summary: Delete weather conditions from a case
    operationId: deleteCaseWeather
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    responses:
      "204":
        description: Weather conditions deleted successfully.
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
caseScene:
  get:
    tags:
      - Accident Environment
    summary: Get scene data for a case
    operationId: getCaseScene
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    responses:
      "200":
        description: Scene returned successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/AccidentSceneOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  put:
    tags:
      - Accident Environment
    summary: Refresh scene data from Google Maps providers
    operationId: refreshCaseScene
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/RefreshAccidentSceneRequest"
    responses:
      "200":
        description: Scene refreshed successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/AccidentSceneOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
      "502":
        $ref: "../../IDAP.yaml#/components/responses/ExternalDataUnavailableProblem"
  delete:
    tags:
      - Accident Environment
    summary: Delete scene data from a case
    operationId: deleteCaseScene
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/CaseId"
    responses:
      "204":
        description: Scene deleted successfully.
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
