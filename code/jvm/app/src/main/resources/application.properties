server.port=${PORT:8080}

spring.application.name=idap

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/idap}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Keep false for local HTTP/Postman. Use true in production behind HTTPS.
idap.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
idap.measurement.python-executable=${MEASUREMENT_PYTHON:python}
idap.measurement.script-path=${MEASUREMENT_SCRIPT:Image_analysis/measurement_engine.py}
idap.measurement.output-dir=${MEASUREMENT_OUTPUT_DIR:build/idap-measurements}
idap.measurement.timeout-seconds=${MEASUREMENT_TIMEOUT_SECONDS:90}
idap.measurement.tesseract-executable=${TESSERACT_CMD:}
idap.report.output-dir=${REPORT_OUTPUT_DIR:build/idap-reports}

# Image object storage (MinIO / S3-compatible). Image bytes live here, not in PostgreSQL.
idap.storage.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
idap.storage.access-key=${MINIO_ACCESS_KEY:minioadmin}
idap.storage.secret-key=${MINIO_SECRET_KEY:minioadmin}
idap.storage.bucket=${MINIO_BUCKET:idap-images}

# Upload limits for multipart image evidence.
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:25MB}
idap.weather.api-key=${WEATHERAPI_KEY:}
idap.weather.base-url=${WEATHERAPI_BASE_URL:https://api.weatherapi.com/v1}
idap.scene.google-api-key=${GOOGLE_MAPS_API_KEY:}
idap.scene.street-view-metadata-url=${GOOGLE_STREET_VIEW_METADATA_URL:https://maps.googleapis.com/maps/api/streetview/metadata}
idap.scene.geocoding-url=${GOOGLE_GEOCODING_URL:https://maps.googleapis.com/maps/api/geocode/json}
idap.scene.elevation-url=${GOOGLE_ELEVATION_URL:https://maps.googleapis.com/maps/api/elevation/json}

spring.datasource.driver-class-name=org.postgresql.Driver
