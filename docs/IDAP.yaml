openapi: 3.1.0
info:
  title: IDAP API
  description: IDAP API Documentation
  version: 0.1.9

servers:
  - url: https://api.example.com/v1
    description: Main (production) server
  - url: https://staging-api.example.com
    description: Internal staging server for testing

tags:
  - name: User
    description: Operations related to users
  - name: Case
    description: Operation related to case analysis

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: idap_session

paths:
  /api/users:
    get:
      tags:
        - User
      summary: Returns a list of users
      description: System administrators only.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: A JSON array of user infos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    userId:
                      type: integer
                    username:
                      type: string
                    email:
                      type: string
                      format: email
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Access denied

    post:
      tags:
        - User
      summary: Creates a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - email
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "201":
          description: User created successfully
        "400":
          description: Invalid username, email, or password
        "409":
          description: Username or email already exists

  /api/users/{id}:
    get:
      tags:
        - User
      summary: Returns a user by ID
      description: Users can read their own user profile. System administrators can read any user profile.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A JSON object containing user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
                    format: email
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Access denied
        "404":
          description: User not found

    delete:
      tags:
        - User
      summary: Deletes a user by ID
      description: System administrators only.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted successfully
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Access denied
        "404":
          description: User not found

  /api/users/login:
    post:
      tags:
        - User
      summary: Logs in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: User logged in successfully. The session is returned in an HttpOnly idap_session cookie.
          headers:
            Set-Cookie:
              description: HttpOnly session cookie.
              schema:
                type: string
                example: idap_session=abc123; Path=/; Max-Age=86400; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
                    format: email
        "401":
          description: Invalid credentials

  /api/users/me:
    get:
      tags:
        - User
      summary: Returns the current authenticated user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current authenticated user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
                    format: email
        "401":
          description: Missing, invalid, or expired session cookie

  /api/users/logout:
    post:
      tags:
        - User
      summary: Logs out a user
      security:
        - cookieAuth: []
      responses:
        "204":
          description: User logged out successfully. The session cookie is expired.
        "401":
          description: Missing, invalid, or expired session cookie

  /api/cases:
    get:
      tags:
        - Case
      summary: Returns a list of cases
      description: >
        Requires a valid session cookie. Regular users receive only their own cases.
        System administrators receive all cases. Missing, invalid, or expired session
        cookies are rejected.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: A JSON array of case infos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    caseId:
                      type: integer
                    userId:
                      type: integer
                    createdAt:
                      type: string
                      example: "2026-05-17 16:42:10"
                    status:
                      type: string
                    description:
                      type: string
                      nullable: true
        "401":
          description: Missing, invalid, or expired session cookie

    post:
      tags:
        - Case
      summary: Creates a new case
      description: >
        Requires a valid session cookie. Regular users always create cases for themselves.
        System administrators may provide userId to create a case for another user.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  description: Optional and only honored for system administrators.
                description:
                  type: string
                  nullable: true
                status:
                  type: string
      responses:
        "201":
          description: Case created successfully
          headers:
            Location:
              description: URL of the created case.
              schema:
                type: string
                example: /api/cases/1
          content:
            application/json:
              schema:
                type: object
                properties:
                  caseId:
                    type: integer
                  userId:
                    type: integer
                  createdAt:
                    type: string
                    example: "2026-05-17 16:42:10"
                  status:
                    type: string
                  description:
                    type: string
                    nullable: true
        "400":
          description: Invalid case status or invalid case description
        "401":
          description: Missing, invalid, or expired session cookie
        "404":
          description: User not found

  /api/cases/{id}:
    get:
      tags:
        - Case
      summary: Returns case info by ID
      description: Regular users can access only their own cases. System administrators can access any case.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A JSON object containing case info
          content:
            application/json:
              schema:
                type: object
                properties:
                  caseId:
                    type: integer
                  userId:
                    type: integer
                  createdAt:
                    type: string
                    example: "2026-05-17 16:42:10"
                  status:
                    type: string
                  description:
                    type: string
                    nullable: true
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Case access denied
        "404":
          description: Case not found

    delete:
      tags:
        - Case
      summary: Deletes a case by ID
      description: Regular users can delete only their own cases. System administrators can delete any case.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Case deleted successfully
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Case access denied
        "404":
          description: Case not found

    put:
      tags:
        - Case
      summary: Updates a case
      description: Regular users can update only their own cases. System administrators can update any case.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  nullable: true
                status:
                  type: string
      responses:
        "200":
          description: Case updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  caseId:
                    type: integer
                  userId:
                    type: integer
                  createdAt:
                    type: string
                    example: "2026-05-17 16:42:10"
                  status:
                    type: string
                  description:
                    type: string
                    nullable: true
        "400":
          description: Invalid case status or invalid case description
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Case access denied
        "404":
          description: Case not found

  /api/users/{userId}/cases:
    get:
      tags:
        - Case
      summary: Returns a list of cases created by a specified user
      description: Regular users can list only their own cases. System administrators can list any user's cases.
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A JSON array of a user's cases
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    caseId:
                      type: integer
                    userId:
                      type: integer
                    createdAt:
                      type: string
                      example: "2026-05-17 16:42:10"
                    status:
                      type: string
                    description:
                      type: string
                      nullable: true
        "401":
          description: Missing, invalid, or expired session cookie
        "403":
          description: Case access denied
        "404":
          description: User not found
