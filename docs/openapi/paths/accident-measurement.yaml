analysisMeasurements:
  get:
    tags:
      - Accident Measurements
    summary: List measurements for an analysis
    operationId: listAnalysisMeasurements
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    responses:
      "200":
        description: Measurements returned successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../../IDAP.yaml#/components/schemas/MeasurementOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  post:
    tags:
      - Accident Measurements
    summary: Measure an analyst-selected damage
    operationId: createAnalysisMeasurement
    description: |
      Detects and perspective-corrects the ruler, automatically calibrates its physical
      values using OCR and detected tick spacing, and calculates the ruler height/range
      occupied by the analyst-selected damage rectangle. Manual ruler reference points
      are an optional fallback for unreadable rulers. When a comparison image is supplied, both images
      are normalized to the same physical scale and vertically aligned at the primary
      damage ruler value.
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/AnalysisId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../IDAP.yaml#/components/schemas/CreateMeasurementRequest"
          examples:
            automaticCalibration:
              summary: Automatically calibrate the rulers and measure two selected damage regions
              value:
                evidenceId: 1
                damageId: 1
                comparisonEvidenceId: 2
                knownTickDistanceCm: 1.0
                primarySelection:
                  x1: 370
                  y1: 515
                  x2: 1450
                  y2: 650
                comparisonSelection:
                  x1: 1000
                  y1: 120
                  x2: 1160
                  y2: 220
    responses:
      "201":
        description: Measurement created successfully.
        headers:
          Location:
            schema:
              type: string
              example: /api/measurements/1
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/MeasurementOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
measurementById:
  get:
    tags:
      - Accident Measurements
    summary: Get measurement by id
    operationId: getMeasurementById
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/MeasurementId"
    responses:
      "200":
        description: Measurement returned successfully.
        content:
          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/MeasurementOutput"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  delete:
    tags:
      - Accident Measurements
    summary: Delete measurement
    operationId: deleteMeasurement
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/MeasurementId"
    responses:
      "204":
        description: Measurement deleted successfully.
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
