server.port=${PORT:8080}

spring.application.name=idap

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/idap}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Keep false for local HTTP/Postman. Use true in production behind HTTPS.
idap.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

spring.datasource.driver-class-name=org.postgresql.Driver
