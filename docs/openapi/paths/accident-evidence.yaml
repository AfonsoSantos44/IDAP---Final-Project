          application/json:
            schema:
              $ref: "../../IDAP.yaml#/components/schemas/ImageEvidenceOutput"
      "400":
        $ref: "../../IDAP.yaml#/components/responses/BadRequestProblem"
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
  delete:
    tags:
      - Accident Evidence
    summary: Delete image metadata for evidence
    operationId: deleteEvidenceImage
    security:
      - cookieAuth: []
    parameters:
      - $ref: "../../IDAP.yaml#/components/parameters/EvidenceId"
    responses:
      "204":
        description: Image evidence deleted successfully.
      "401":
        $ref: "../../IDAP.yaml#/components/responses/UnauthorizedProblem"
      "403":
        $ref: "../../IDAP.yaml#/components/responses/CaseAccessDeniedProblem"
      "404":
        $ref: "../../IDAP.yaml#/components/responses/NotFoundProblem"
