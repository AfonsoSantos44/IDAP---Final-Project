openapi: 3.0.3
info:
  title: IDAP API
  description: >
    REST API for the Intelligent Damage Analysis Platform backend. The current
    implementation supports user registration, cookie-based session
    authentication, role-based authorization, and accident case management.
  version: 0.2.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Users
    description: User registration, session management, and user administration
  - name: Cases
    description: Accident case management

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: idap_session
      description: >
        Opaque session token returned by POST /api/users/login in an HttpOnly
        idap_session cookie. The API does not use JWT or Bearer authentication.

  schemas:
    CreateUserRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
          description: Letters, digits, underscores, hyphens, and dots are accepted.
          example: afonso
        email:
          type: string
          format: email
          maxLength: 255
          example: afonso@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: Must include uppercase, lowercase, and numeric characters.
          example: StrongPass123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: afonso@example.com
        password:
          type: string
          format: password
          example: StrongPass123

    UserOutput:
      type: object
      required:
        - userId
        - username
        - email
      properties:
        userId:
          type: integer
          format: int32
          example: 1
        username:
          type: string
          example: afonso
        email:
          type: string
          format: email
          example: afonso@example.com

    CurrentUser:
      allOf:
        - $ref: "#/components/schemas/UserOutput"

    CreateCaseRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int32
          nullable: true
          description: Optional and only honored for administrator users.
          example: 2
        description:
          type: string
          maxLength: 5000
          nullable: true
          example: Front-left impact with visible bumper deformation.
        status:
          type: string
          maxLength: 50
          nullable: true
          example: open

    UpdateCaseRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 5000
          nullable: true
          example: Updated accident description.
        status:
          type: string
          maxLength: 50
          nullable: true
          example: closed

    CaseOutput:
      type: object
      required:
        - caseId
        - userId
        - createdAt
        - status
        - description
      properties:
        caseId:
          type: integer
          format: int32
          example: 10
        userId:
          type: integer
          format: int32
          example: 1
        createdAt:
          type: string
          description: Formatted in the server time zone as yyyy-MM-dd HH:mm:ss.
          example: "2026-05-17 16:42:10"
        status:
          type: string
          example: open
        description:
          type: string
          nullable: true
          example: Front-left impact with visible bumper deformation.

    Problem:
      type: object
      required:
        - type
        - title
      properties:
        type:
          type: string
          format: uri
          example: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/invalid-token
        title:
          type: string
          example: Invalid token

  responses:
    BadRequestProblem:
      description: Request validation failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnauthorizedProblem:
      description: Missing, invalid, or expired session cookie.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            noUserLoggedIn:
              value:
                type: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/no-user-logged-in
                title: No user currently logged in
            invalidToken:
              value:
                type: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/invalid-token
                title: Invalid token
            expiredToken:
              value:
                type: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/expired-token
                title: Expired token
    AccessDeniedProblem:
      description: The authenticated user does not have permission to access this resource.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/access-denied
            title: Access denied
    CaseAccessDeniedProblem:
      description: The authenticated user does not have permission to access this case.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/case-access-denied
            title: Case access denied
    NotFoundProblem:
      description: The requested resource was not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ConflictProblem:
      description: A unique user field already exists.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

paths:
  /api/users:
    post:
      tags:
        - Users
      summary: Register a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully.
          headers:
            Location:
              description: URL of the created user.
              schema:
                type: string
                example: /api/users/1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOutput"
        "400":
          $ref: "#/components/responses/BadRequestProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"

    get:
      tags:
        - Users
      summary: List all users
      operationId: listUsers
      description: Administrator permission is required.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Users returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserOutput"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/AccessDeniedProblem"

  /api/users/login:
    post:
      tags:
        - Users
      summary: Log in
      operationId: login
      description: >
        Valid credentials create an opaque session token and return it in the
        idap_session HttpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          headers:
            Set-Cookie:
              description: Session cookie containing the raw opaque token.
              schema:
                type: string
                example: idap_session=abc123; Path=/; Max-Age=86400; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Invalid credentials.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://github.com/AfonsoSantos44/IDAP---Final-Project/docs/problems/invalid-credentials
                title: Invalid credentials

  /api/users/logout:
    post:
      tags:
        - Users
      summary: Log out
      operationId: logout
      description: Deletes the current persisted session token and expires the cookie.
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logout succeeded.
          headers:
            Set-Cookie:
              description: Expired idap_session cookie.
              schema:
                type: string
                example: idap_session=; Path=/; Max-Age=0; HttpOnly; SameSite=Lax
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"

  /api/users/me:
    get:
      tags:
        - Users
      summary: Get the current authenticated user
      operationId: getCurrentUser
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get a user by id
      operationId: getUserById
      description: Users can read their own profile. Administrators can read any profile.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: User returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOutput"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/AccessDeniedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"

    delete:
      tags:
        - Users
      summary: Delete a user by id
      operationId: deleteUserById
      description: Administrator permission is required.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: User deleted successfully.
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/AccessDeniedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"

  /api/cases:
    get:
      tags:
        - Cases
      summary: List cases
      operationId: listCases
      description: Regular users receive only their own cases. Administrators receive all cases.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cases returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseOutput"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"

    post:
      tags:
        - Cases
      summary: Create a case
      operationId: createCase
      description: >
        Regular users always create cases for themselves. Administrators may
        provide userId to create a case for another user.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "201":
          description: Case created successfully.
          headers:
            Location:
              description: URL of the created case.
              schema:
                type: string
                example: /api/cases/10
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseOutput"
        "400":
          $ref: "#/components/responses/BadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"

  /api/cases/{id}:
    get:
      tags:
        - Cases
      summary: Get a case by id
      operationId: getCaseById
      description: Regular users can access only their own cases. Administrators can access any case.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Case returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseOutput"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/CaseAccessDeniedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"

    put:
      tags:
        - Cases
      summary: Update a case
      operationId: updateCase
      description: Regular users can update only their own cases. Administrators can update any case.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseRequest"
      responses:
        "200":
          description: Case updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseOutput"
        "400":
          $ref: "#/components/responses/BadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/CaseAccessDeniedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"

    delete:
      tags:
        - Cases
      summary: Delete a case by id
      operationId: deleteCaseById
      description: Regular users can delete only their own cases. Administrators can delete any case.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: Case deleted successfully.
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/CaseAccessDeniedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"

  /api/users/{userId}/cases:
    get:
      tags:
        - Cases
      summary: List cases for a user
      operationId: listCasesByUserId
      description: Regular users can list only their own cases. Administrators can list any user's cases.
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Cases returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseOutput"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/CaseAccessDeniedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
